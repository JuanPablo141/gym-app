name: Backend tests

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gymapp_test
          POSTGRES_USER: gymapp_user
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gymapp_user -d gymapp_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_NAME: gymapp_test
      DB_USER: gymapp_user
      DB_PASSWORD: ci-password
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ci-not-a-real-secret
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run migrations (smoke check)
        run: python manage.py migrate --check || python manage.py migrate

      - name: Run tests with coverage gate
        run: pytest
